<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Washington Census Tracts</title>
  <link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: system-ui, sans-serif;
    }
    .layout {
      display: flex;
      height: 100%;
      width: 100%;
    }
    .map-wrap {
      position: relative;
      flex: 1 1 auto;
      min-width: 0;
    }
    #map {
      width: 100%;
      height: 100%;
    }
    .map-title {
      position: absolute;
      top: 10px;
      left: 10px;
      padding: 6px 10px;
      background: rgba(255,255,255,0.9);
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      z-index: 1;
    }
    .sidebars {
      display: flex;
      flex-direction: column;
      width: 320px;
      min-width: 260px;
      border-left: 1px solid #ddd;
      background: #f8f9fa;
    }
    .sidebar-panel {
      flex: 1 1 50%;
      border-bottom: 1px solid #ddd;
      background: #fff;
      padding: 12px;
      box-sizing: border-box;
    }
    .legend-title {
      font-size: 14px;
      font-weight: 600;
      margin: 0 0 10px 0;
    }
    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 12px;
    }
    .legend-swatch {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      border: 1px solid rgba(0,0,0,0.2);
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="layout">
    <div class="map-wrap">
      <div id="map"></div>
      <div class="map-title">Washington Census Tracts</div>
    </div>
    <div class="sidebars">
      <div class="sidebar-panel" id="legend-panel">
        <p class="legend-title">Pedestrian Access Score</p>
        <div class="legend-row"><span class="legend-swatch" style="background:#1976D2;"></span><span>High Transit, High Essentials</span></div>
        <div class="legend-row"><span class="legend-swatch" style="background:#90CAF9;"></span><span>High Transit, Low Essentials</span></div>
        <div class="legend-row"><span class="legend-swatch" style="background:#BDBDBD;"></span><span>Low Transit, High Essentials</span></div>
        <div class="legend-row"><span class="legend-swatch" style="background:#424242;"></span><span>Low Transit, Low Essentials</span></div>
        <div class="legend-row"><span class="legend-swatch" style="background:#FF9800;"></span><span>Data Deficient</span></div>
      </div>
      <div class="sidebar-panel" id="tract-details"></div>
    </div>
  </div>

  <script>
    const WA_CENTER = [-120.5, 47.4];
    const WA_ZOOM = 6;

    const map = new maplibregl.Map({
      container: 'map',
      style: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
      center: WA_CENTER,
      zoom: WA_ZOOM
    });

    map.addControl(new maplibregl.NavigationControl(), 'top-right');

    let initialBounds = null;
    let selectedGeoid = null;
    let amenitiesByGeoid = {};

    function renderTractDetails(geoid) {
      const panel = document.getElementById('tract-details');
      if (!panel) return;
      if (!geoid) {
        panel.innerHTML = '<p>Please select a census tract.</p>';
        return;
      }
      const a = amenitiesByGeoid[geoid];
      if (!a) {
        panel.innerHTML = `
          <p><strong>GEOID:</strong> ${geoid}</p>
          <p>No amenity data available for this tract.</p>
        `;
        return;
      }
      const pop = a.TOTAL_POPU != null ? Number(a.TOTAL_POPU).toLocaleString() : '—';
      const totalAmen = a.total_amenities != null ? a.total_amenities : 0;
      const ped = a.unconstrained_pedestrian_count != null ? a.unconstrained_pedestrian_count : 0;
      const wheel = a.manual_wheelchair_count != null ? a.manual_wheelchair_count : 0;
      panel.innerHTML = `
        <h3>Tract summary</h3>
        <p><strong>GEOID:</strong> ${geoid}</p>
        <p><strong>Total population:</strong> ${pop}</p>
        <p><strong>Total amenities:</strong> ${totalAmen}</p>
        <p><strong>Pedestrian unconstrained amenities:</strong> ${ped}</p>
        <p><strong>Wheelchair accessible amenities:</strong> ${wheel}</p>
      `;
    }

    map.on('load', async () => {
      try {
        const resp = await fetch('WA Census Tracts.geojson');
        const data = await resp.json();

        // Load amenities for sidebar stats and access score (joined by GEOID)
        try {
          const amenitiesResp = await fetch('WA amenities.csv');
          const amenitiesText = await amenitiesResp.text();
          const lines = amenitiesText.split(/\r?\n/).filter(Boolean);
          const header = lines[0].split(',');
          const idxGEOID = header.indexOf('GEOID');
          const idxTotal = header.indexOf('total_amenities');
          const idxPed = header.indexOf('unconstrained_pedestrian_count');
          const idxWheel = header.indexOf('manual_wheelchair_count');
          const idxPop = header.indexOf('TOTAL_POPU');
          const idxPedAccess = header.indexOf('pedestrian_access_score');
          for (let i = 1; i < lines.length; i++) {
            const cols = lines[i].split(',');
            const geoid = (cols[idxGEOID] || '').trim();
            if (!geoid) continue;
            const accessScore = (cols[idxPedAccess] || '').trim();
            amenitiesByGeoid[geoid] = {
              total_amenities: cols[idxTotal] ? Number(cols[idxTotal]) : 0,
              unconstrained_pedestrian_count: cols[idxPed] ? Number(cols[idxPed]) : 0,
              manual_wheelchair_count: cols[idxWheel] ? Number(cols[idxWheel]) : 0,
              TOTAL_POPU: cols[idxPop] ? Number(cols[idxPop]) : 0,
              pedestrian_access_score: (accessScore === 'HH' || accessScore === 'HL' || accessScore === 'LH' || accessScore === 'LL') ? accessScore : 'Data Deficient'
            };
          }
        } catch (e) {
          console.warn('Failed to load WA amenities.csv for sidebar stats:', e);
        }

        // Enrich tract features with pedestrian_access_score for color coding
        const enrichedData = {
          type: 'FeatureCollection',
          features: data.features.map(f => {
            const geoid = (f.properties && f.properties.GEOID) || '';
            const score = amenitiesByGeoid[geoid] ? amenitiesByGeoid[geoid].pedestrian_access_score : 'Data Deficient';
            return {
              ...f,
              properties: { ...f.properties, pedestrian_access_score: score }
            };
          })
        };

        map.addSource('wa-tracts', {
          type: 'geojson',
          data: enrichedData
        });

        map.addLayer({
          id: 'wa-tracts-fill',
          type: 'fill',
          source: 'wa-tracts',
          paint: {
            'fill-color': [
              'match', ['get', 'pedestrian_access_score'],
              'HH', '#1976D2',
              'HL', '#90CAF9',
              'LH', '#BDBDBD',
              'LL', '#424242',
              '#FF9800'
            ],
            'fill-opacity': 0.75
          }
        });

        map.addLayer({
          id: 'wa-tracts-outline',
          type: 'line',
          source: 'wa-tracts',
          paint: {
            'line-color': '#424242',
            'line-width': 0.6
          }
        });

        // Highlight layer for selected tract
        map.addLayer({
          id: 'wa-tracts-highlight',
          type: 'line',
          source: 'wa-tracts',
          paint: {
            'line-color': '#000000',
            'line-width': 2.5
          },
          filter: ['==', ['get', 'GEOID'], '']
        });

        // Fit the map to the extent of all tracts
        const bounds = new maplibregl.LngLatBounds();
        data.features.forEach(f => {
          const geom = f.geometry;
          if (!geom) return;
          const coords = geom.type === 'Polygon'
            ? geom.coordinates
            : geom.type === 'MultiPolygon'
              ? geom.coordinates
              : null;
          if (!coords) return;
          const eachRing = geom.type === 'Polygon' ? coords : coords.flat();
          eachRing.forEach(ring => {
            ring.forEach(([lng, lat]) => {
              bounds.extend([lng, lat]);
            });
          });
        });
        if (!bounds.isEmpty()) {
          initialBounds = bounds;
          map.fitBounds(bounds, { padding: 30, maxZoom: 10 });
        }

        // Initial sidebar message
        renderTractDetails(null);

        // Simple hover cursor and click popup showing GEOID
        map.on('mousemove', 'wa-tracts-fill', e => {
          map.getCanvas().style.cursor = e.features.length ? 'pointer' : '';
        });

        const popup = new maplibregl.Popup({ closeButton: false, closeOnClick: false });
        map.on('mousemove', 'wa-tracts-fill', e => {
          if (!e.features.length) {
            popup.remove();
            return;
          }
          const f = e.features[0];
          const geoid = f.properties.GEOID || '';

          // Prefer the detailed name if present; otherwise derive from county code.
          let name = f.properties.wa_demo_census_tract_NAME || '';
          if (!name) {
            const countyFp = f.properties.COUNTYFP || '';
            let countyName = '';
            switch (countyFp) {
              case '001': countyName = 'Adams County'; break;
              case '003': countyName = 'Asotin County'; break;
              case '005': countyName = 'Benton County'; break;
              case '007': countyName = 'Chelan County'; break;
              case '009': countyName = 'Clallam County'; break;
              case '011': countyName = 'Clark County'; break;
              case '013': countyName = 'Columbia County'; break;
              case '015': countyName = 'Cowlitz County'; break;
              case '017': countyName = 'Douglas County'; break;
              case '019': countyName = 'Ferry County'; break;
              case '021': countyName = 'Franklin County'; break;
              case '023': countyName = 'Garfield County'; break;
              case '025': countyName = 'Grant County'; break;
              case '027': countyName = 'Grays Harbor County'; break;
              case '029': countyName = 'Island County'; break;
              case '031': countyName = 'Jefferson County'; break;
              case '033': countyName = 'King County'; break;
              case '035': countyName = 'Kitsap County'; break;
              case '037': countyName = 'Kittitas County'; break;
              case '039': countyName = 'Klickitat County'; break;
              case '041': countyName = 'Lewis County'; break;
              case '043': countyName = 'Lincoln County'; break;
              case '045': countyName = 'Mason County'; break;
              case '047': countyName = 'Okanogan County'; break;
              case '049': countyName = 'Pacific County'; break;
              case '051': countyName = 'Pend Oreille County'; break;
              case '053': countyName = 'Pierce County'; break;
              case '055': countyName = 'San Juan County'; break;
              case '057': countyName = 'Skagit County'; break;
              case '059': countyName = 'Skamania County'; break;
              case '061': countyName = 'Snohomish County'; break;
              case '063': countyName = 'Spokane County'; break;
              case '065': countyName = 'Stevens County'; break;
              case '067': countyName = 'Thurston County'; break;
              case '069': countyName = 'Wahkiakum County'; break;
              case '071': countyName = 'Walla Walla County'; break;
              case '073': countyName = 'Whatcom County'; break;
              case '075': countyName = 'Whitman County'; break;
              case '077': countyName = 'Yakima County'; break;
              default: countyName = ''; break;
            }
            if (countyName) {
              const shortTract = geoid ? geoid.slice(-5) : '';
              name = `Census Tract ${shortTract}; ${countyName}; Washington`;
            }
          }

          popup
            .setLngLat(e.lngLat)
            .setHTML(
              `<div><strong>${name || 'Census Tract'}</strong><br/>GEOID: ${geoid}</div>`
            )
            .addTo(map);
        });

        map.on('mouseleave', 'wa-tracts-fill', () => {
          map.getCanvas().style.cursor = '';
          popup.remove();
        });

        // Click to zoom into a tract; click again (or on empty map) to reset.
        map.on('click', 'wa-tracts-fill', e => {
          if (!e.features.length) return;
          const f = e.features[0];
          const geoid = f.properties.GEOID;
          if (!geoid) return;

          // If clicking the same tract again, reset to initial view.
          if (selectedGeoid === geoid) {
            selectedGeoid = null;
            map.setFilter('wa-tracts-highlight', ['==', ['get', 'GEOID'], '']);
            if (initialBounds && !initialBounds.isEmpty()) {
              map.fitBounds(initialBounds, { padding: 30, maxZoom: 10 });
            }
            renderTractDetails(null);
            return;
          }

          selectedGeoid = geoid;
          map.setFilter('wa-tracts-highlight', ['==', ['get', 'GEOID'], geoid]);

          const tractBounds = new maplibregl.LngLatBounds();
          const geom = f.geometry;
          if (geom && (geom.type === 'Polygon' || geom.type === 'MultiPolygon')) {
            const coords = geom.type === 'Polygon' ? geom.coordinates : geom.coordinates.flat();
            coords.forEach(ring => {
              ring.forEach(([lng, lat]) => tractBounds.extend([lng, lat]));
            });
          }
          if (!tractBounds.isEmpty()) {
            map.fitBounds(tractBounds, { padding: 40, maxZoom: 14 });
          }

          renderTractDetails(geoid);
        });

        // Click on empty map (not on a tract) to reset view.
        map.on('click', e => {
          const feats = map.queryRenderedFeatures(e.point, { layers: ['wa-tracts-fill'] });
          if (feats.length) return;
          selectedGeoid = null;
          map.setFilter('wa-tracts-highlight', ['==', ['get', 'GEOID'], '']);
          if (initialBounds && !initialBounds.isEmpty()) {
            map.fitBounds(initialBounds, { padding: 30, maxZoom: 10 });
          }
          renderTractDetails(null);
        });
      } catch (err) {
        alert('Failed to load WA Census Tracts.geojson: ' + err.message);
      }
    });
  </script>
</body>
</html>
