<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Washington Bus Routes</title>
  <link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; width: 100%; font-family: system-ui, sans-serif; }
    .layout { display: flex; height: 100%; width: 100%; }
    .map-wrap { position: relative; flex: 1 1 auto; min-width: 0; }
    #map { width: 100%; height: 100%; }
    .map-title {
      position: absolute; top: 10px; left: 10px;
      padding: 6px 10px; background: rgba(255,255,255,0.9); border-radius: 4px;
      font-size: 14px; font-weight: 600; z-index: 1;
    }
    .sidebars {
      display: flex; flex-direction: column; width: 280px; min-width: 260px;
      border-left: 1px solid #ddd; background: #f8f9fa;
    }
    .sidebar-panel {
      flex: 1 1 50%; border-bottom: 1px solid #ddd; background: #fff;
      padding: 12px; box-sizing: border-box; font-size: 13px; color: #333;
    }
    .sidebar-panel h3 { margin: 0 0 10px; font-size: 14px; }
    .sidebar-panel p { margin: 6px 0; }
    .sidebar-panel .muted { color: #666; }
    .legend-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; font-size: 13px; }
    .legend-swatch { width: 16px; height: 16px; flex-shrink: 0; border: 1px solid rgba(0,0,0,0.15); border-radius: 2px; }
  </style>
</head>
<body>
  <div class="layout">
    <div class="map-wrap">
      <div id="map"></div>
      <div class="map-title">Washington Bus Routes</div>
    </div>
    <div class="sidebars">
      <div class="sidebar-panel" id="route-details"></div>
      <div class="sidebar-panel" id="route-panel-2">
        <h3>Route Score</h3>
        <div class="legend-row"><span class="legend-swatch" style="background:#1F77B4"></span><span>Great</span></div>
        <div class="legend-row"><span class="legend-swatch" style="background:#AEC7E8"></span><span>Good</span></div>
        <div class="legend-row"><span class="legend-swatch" style="background:#D6D6D6"></span><span>Acceptable</span></div>
        <div class="legend-row"><span class="legend-swatch" style="background:#7F7F7F"></span><span>Ok</span></div>
        <div class="legend-row"><span class="legend-swatch" style="background:#525252"></span><span>Poor</span></div>
      </div>
    </div>
  </div>

  <script>
    const WA_CENTER = [-120.5, 47.4];
    const WA_ZOOM = 6;

    const map = new maplibregl.Map({
      container: 'map',
      style: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
      center: WA_CENTER,
      zoom: WA_ZOOM
    });

    map.addControl(new maplibregl.NavigationControl(), 'top-right');

    let initialBounds = null;
    let selectedPathId = null;
    let routeDetailsByPathId = {};

    function renderRouteDetails(pathId) {
      const panel = document.getElementById('route-details');
      if (!panel) return;
      if (!pathId) {
        panel.innerHTML = '<h3>Route Details</h3><p class="muted">Select a route on the map.</p>';
        return;
      }
      const r = routeDetailsByPathId[pathId];
      if (!r) {
        panel.innerHTML = '<h3>Route Details</h3><p class="muted">No details for this route.</p>';
        return;
      }
      const routeId = (r.route_path_id || pathId.split('|')[1] || pathId);
      panel.innerHTML = `
        <h3>Route Details</h3>
        <p><strong>Agency:</strong> ${(r.agency || '—')}</p>
        <p><strong>Route ID:</strong> ${routeId}</p>
        <p><strong>Route Service Window Score:</strong> ${(r.route_score || '—')}</p>
        <p><strong>Population Served:</strong> ${(r.population_served != null ? Number(r.population_served).toLocaleString() : '—')}</p>
        <p><strong>Population Served Low Essentials:</strong> ${(r.population_served_low_essentials != null ? Number(r.population_served_low_essentials).toLocaleString() : '—')}</p>
        <p><strong>Percent Served with Low Essentials:</strong> ${(r.pct_served_low_essentials != null ? r.pct_served_low_essentials + '%' : '—')}</p>
      `;
    }

    function parseCSV(text) {
      const lines = text.split(/\r?\n/).filter(Boolean);
      if (!lines.length) return { header: [], rows: [] };
      const header = lines[0].split(',');
      const rows = [];
      for (let i = 1; i < lines.length; i++) {
        const values = [];
        let rest = lines[i];
        for (let c = 0; c < header.length; c++) {
          if (rest.startsWith('"')) {
            const end = rest.indexOf('"', 1);
            values.push(rest.slice(1, end));
            rest = rest.slice(end + 1);
            if (rest.startsWith(',')) rest = rest.slice(1);
          } else {
            const idx = rest.indexOf(',');
            if (idx === -1) { values.push(rest); break; }
            values.push(rest.slice(0, idx));
            rest = rest.slice(idx + 1);
          }
        }
        rows.push(values);
      }
      return { header, rows };
    }

    function buildRoutesFromCSV(csvText) {
      const { header, rows } = parseCSV(csvText);
      const i = (name) => header.indexOf(name);
      const pathIdIdx = i('route_path_id');
      const agencyIdx = i('agency');
      const latIdx = i('stop_lat');
      const lonIdx = i('stop_lon');
      const seqIdx = i('path_sequence');
      const colorIdx = i('route_color');
      const scoreIdx = i('route_score');
      const popIdx = i('population_served');
      const popLowIdx = i('population_served_low_wheelchair_essentials');
      const pctIdx = i('pct_served_low_essentials');

      const byPath = {};
      rows.forEach(row => {
        const pathId = (row[pathIdIdx] || '').trim();
        const agency = (row[agencyIdx] || '').trim();
        if (!pathId) return;
        const pathKey = agency + '|' + pathId;
        if (!byPath[pathKey]) {
          byPath[pathKey] = {
            pathKey,
            agency,
            route_path_id: pathId,
            stops: [],
            route_color: (row[colorIdx] || '').trim() || '#0066cc',
            route_score: scoreIdx >= 0 ? (row[scoreIdx] || '').trim() : '',
            population_served: popIdx >= 0 && row[popIdx] !== '' ? row[popIdx] : null,
            population_served_low_essentials: popLowIdx >= 0 && row[popLowIdx] !== '' ? row[popLowIdx] : null,
            pct_served_low_essentials: pctIdx >= 0 && row[pctIdx] !== '' ? row[pctIdx] : null
          };
        }
        const lat = parseFloat(row[latIdx]);
        const lon = parseFloat(row[lonIdx]);
        const seq = parseInt(row[seqIdx], 10);
        if (!Number.isFinite(lat) || !Number.isFinite(lon) || !Number.isFinite(seq)) return;
        byPath[pathKey].stops.push({ path_sequence: seq, lon, lat });
      });

      const excludeAgencies = new Set([
        'central oregon breeze',
        'city of milton-freewater',
        'link transit',
        'people mover'
      ]);

      const routes = Object.values(byPath)
        .filter(r => !excludeAgencies.has((r.agency || '').toLowerCase()))
        .map(r => {
          r.stops.sort((a, b) => a.path_sequence - b.path_sequence);
          const seen = new Set();
          r.stops = r.stops.filter(s => {
            if (seen.has(s.path_sequence)) return false;
            seen.add(s.path_sequence);
            return true;
          });
          r.coordinates = r.stops.map(s => [s.lon, s.lat]);
          return r;
        });

      return routes;
    }

    function routesToGeoJSON(routes) {
      const features = routes
        .filter(r => r.coordinates.length >= 2)
        .map(r => ({
          type: 'Feature',
          properties: { pathId: r.pathKey, agency: r.agency, route_score: r.route_score || '' },
          geometry: { type: 'LineString', coordinates: r.coordinates }
        }));
      return { type: 'FeatureCollection', features };
    }

    function getBoundsFromFeatures(features) {
      const bounds = new maplibregl.LngLatBounds();
      features.forEach(f => {
        const coords = f.geometry && f.geometry.coordinates;
        if (!coords) return;
        coords.forEach(([lng, lat]) => bounds.extend([lng, lat]));
      });
      return bounds.isEmpty() ? null : bounds;
    }

    map.on('load', async () => {
      try {
        const resp = await fetch('WA Bus Routes with score.csv');
        const csvText = await resp.text();
        const routes = buildRoutesFromCSV(csvText);
        routes.forEach(r => { routeDetailsByPathId[r.pathKey] = r; });
        const geojson = routesToGeoJSON(routes);

        renderRouteDetails(null);

        map.addSource('routes', {
          type: 'geojson',
          data: geojson
        });

        map.addLayer({
          id: 'routes-line',
          type: 'line',
          source: 'routes',
          layout: { 'line-join': 'round', 'line-cap': 'round' },
          paint: {
            'line-color': [
              'match',
              ['get', 'route_score'],
              'Great', '#1F77B4',
              'Good', '#AEC7E8',
              'Acceptable', '#D6D6D6',
              'Ok', '#7F7F7F',
              'Poor', '#525252',
              '#7F7F7F'
            ],
            'line-width': 2.5,
            'line-opacity': 0.85
          }
        });

        const bounds = getBoundsFromFeatures(geojson.features);
        if (bounds) {
          initialBounds = bounds;
          map.fitBounds(bounds, { padding: 40, maxZoom: 10 });
        }

        map.on('click', 'routes-line', (e) => {
          if (!e.features.length) return;
          const f = e.features[0];
          const pathId = f.properties.pathId;
          if (!pathId) return;

          if (selectedPathId === pathId) {
            selectedPathId = null;
            renderRouteDetails(null);
            if (initialBounds) map.fitBounds(initialBounds, { padding: 40, maxZoom: 10 });
            return;
          }

          selectedPathId = pathId;
          renderRouteDetails(pathId);
          const coords = f.geometry && f.geometry.coordinates;
          if (coords && coords.length) {
            const routeBounds = new maplibregl.LngLatBounds();
            coords.forEach(([lng, lat]) => routeBounds.extend([lng, lat]));
            map.fitBounds(routeBounds, { padding: 50, maxZoom: 14 });
          }
        });

        map.on('click', (e) => {
          const feats = map.queryRenderedFeatures(e.point, { layers: ['routes-line'] });
          if (feats.length) return;
          selectedPathId = null;
          renderRouteDetails(null);
          if (initialBounds) map.fitBounds(initialBounds, { padding: 40, maxZoom: 10 });
        });

        map.on('mouseenter', 'routes-line', () => { map.getCanvas().style.cursor = 'pointer'; });
        map.on('mouseleave', 'routes-line', () => { map.getCanvas().style.cursor = ''; });
      } catch (err) {
        alert('Failed to load bus routes: ' + err.message);
      }
    });
  </script>
</body>
</html>
